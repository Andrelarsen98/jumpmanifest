<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; }
  body {
    font-family: "Plus Jakarta Sans", -apple-system, sans-serif;
    color: #fff; overflow: hidden;
    background:
      radial-gradient(70% 60% at 22% -10%, rgba(124,58,237,.42) 0%, rgba(124,58,237,0) 60%),
      radial-gradient(60% 60% at 110% 30%, rgba(67,56,202,.30) 0%, rgba(67,56,202,0) 60%),
      #0B0B0F;
    position: relative;
  }
  .dots { position: absolute; inset: 0;
    background-image: radial-gradient(rgba(255,255,255,.05) 1.4px, transparent 1.4px);
    background-size: 38px 38px; opacity: .6; }
  .card { position: relative; height: 100%; padding: 84px 90px;
    display: flex; flex-direction: column; justify-content: space-between; }
  .top { display: flex; align-items: center; gap: 22px; }
  .top img { width: 92px; height: 92px; border-radius: 24px;
    box-shadow: 0 14px 40px rgba(124,58,237,.5); }
  .top .nm { font-weight: 800; font-size: 50px; letter-spacing: -.02em; }
  .pill { display: inline-flex; align-items: center; gap: 12px; align-self: flex-start;
    font-weight: 700; font-size: 22px; letter-spacing: .06em; text-transform: uppercase;
    color: #c4b5fd; background: rgba(124,58,237,.16); border: 1px solid rgba(124,58,237,.45);
    padding: 12px 24px; border-radius: 100px; margin-top: 8px; }
  .pill .dot { width: 11px; height: 11px; border-radius: 50%; background: #a78bfa; box-shadow: 0 0 14px #7C3AED; }
  h1 { font-weight: 800; font-size: 96px; line-height: 1.0; letter-spacing: -.04em; }
  h1 .accent { color: #c4b5fd; }
  p { font-weight: 600; font-size: 34px; color: #b3acc9; max-width: 22ch; }
  p b { color: #fff; font-weight: 700; }
</style>
</head>
<body>
<div class="dots"></div>
<div class="card">
  <div>
    <div class="top">
      <img src="assets/app-icon.png" alt="Manifest" />
      <span class="nm">Manifest</span>
    </div>
  </div>
  <div>
    <span class="pill"><span class="dot"></span> Now in private beta</span>
    <h1 style="margin-top:24px">Log it. Verify it. <span class="accent">Trade it.</span></h1>
  </div>
  <p>The gear passport for skydivers — <b>verified history</b> that transfers when you sell.</p>
</div>
</body>
</html>
