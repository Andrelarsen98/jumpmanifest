<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Profile — Manifest</title>
  <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('mf_theme') || 'dark')</script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/app/styles.css">
  <style>
    /* Hero */
    .profile-hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 1.5rem;
      text-align: center;
    }
    .profile-avatar {
      width: 76px; height: 76px;
      border-radius: 50%;
      background: var(--accent-dim);
      border: 2px solid var(--accent-dim2);
      display: grid;
      place-items: center;
      font-size: 1.75rem;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: -0.02em;
      margin-bottom: 0.875rem;
    }
    .profile-name {
      font-size: 1.375rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 0.375rem;
    }
    .profile-jump-count {
      font-size: 4rem;
      font-weight: 900;
      letter-spacing: -0.06em;
      line-height: 1;
      color: var(--t1);
      margin: 0.5rem 0;
    }
    .profile-jump-label {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--t3);
      margin-bottom: 1rem;
    }
    .profile-dz {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.875rem;
      color: var(--t2);
      font-weight: 500;
      margin-bottom: 0.75rem;
    }
    .profile-dz svg { color: var(--accent); flex-shrink: 0; }
    .profile-chips {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 6px;
    }
    .profile-rating-chip {
      padding: 4px 10px;
      border-radius: 7px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      background: var(--accent-dim);
      border: 1px solid var(--accent-dim2);
      color: var(--accent);
    }

    /* Stats row */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0;
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      margin: 0 1rem 1rem;
      background: var(--surface);
    }
    .stat-cell {
      padding: 1rem 0.5rem;
      text-align: center;
      border-right: 1px solid var(--border);
    }
    .stat-cell:last-child { border-right: none; }
    .stat-cell-val {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -0.04em;
    }
    .stat-cell-label {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--t3);
      margin-top: 3px;
    }

    /* Settings sections */
    .settings-section {
      margin: 0 1rem 0.75rem;
    }
    .settings-label {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--t3);
      padding: 0 0.25rem;
      margin-bottom: 0.5rem;
    }
    .settings-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }
    .settings-row {
      display: flex;
      align-items: center;
      gap: 0.875rem;
      padding: 0.875rem 1rem;
      border-bottom: 1px solid var(--border);
      color: var(--t1);
    }
    .settings-row:last-child { border-bottom: none; }
    .settings-row-icon {
      width: 34px; height: 34px;
      border-radius: 9px;
      display: grid;
      place-items: center;
      flex-shrink: 0;
    }
    .settings-row-icon.amber { background: var(--accent-dim); color: var(--accent); }
    .settings-row-icon.neutral { background: var(--surface2); color: var(--t2); }
    .settings-row-icon.danger { background: var(--danger-dim); color: var(--danger); }
    .settings-row-body { flex: 1; }
    .settings-row-title {
      font-size: 0.875rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    .settings-row-sub {
      font-size: 0.75rem;
      color: var(--t2);
      margin-top: 1px;
    }

    /* Toggle switch */
    .toggle {
      width: 44px; height: 26px;
      border-radius: 13px;
      background: var(--border2);
      position: relative;
      cursor: pointer;
      border: none;
      padding: 0;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .toggle.on { background: var(--accent); }
    .toggle::after {
      content: '';
      position: absolute;
      top: 3px; left: 3px;
      width: 20px; height: 20px;
      border-radius: 50%;
      background: #fff;
      transition: transform 0.2s;
    }
    .toggle.on::after { transform: translateX(18px); }

    /* Select pill */
    .select-pill {
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 5px 10px;
      font-family: inherit;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--t1);
      cursor: pointer;
      outline: none;
      -webkit-appearance: none;
    }

    .signout-btn {
      background: none;
      border: none;
      font-family: inherit;
      cursor: pointer;
      width: 100%;
      text-align: left;
      color: var(--danger);
      display: flex;
      align-items: center;
      gap: 0.875rem;
      padding: 0;
    }

    /* Footer */
    .profile-footer {
      text-align: center;
      padding: 1.5rem 1rem 6rem;
      font-size: 0.72rem;
      color: var(--t3);
      font-weight: 500;
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>
<div class="app-shell">

  <!-- Top nav -->
  <header class="top-nav">
    <div style="width:36px"></div>
    <h1 class="nav-title">Profile</h1>
    <div class="nav-actions">
      <button class="theme-toggle" aria-label="Toggle theme">
        <svg class="icon-sun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
        <svg class="icon-moon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
      </button>
    </div>
  </header>

  <!-- Hero -->
  <div class="profile-hero" id="profile-hero">
    <div class="profile-avatar" id="profile-avatar">?</div>
    <div class="profile-name" id="profile-name">—</div>
    <div class="profile-jump-count" id="profile-jump-count">—</div>
    <div class="profile-jump-label">Total Jumps</div>
    <div class="profile-dz" id="profile-dz" style="display:none">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
      <span id="profile-dz-name"></span>
    </div>
    <div class="profile-chips" id="profile-chips"></div>
  </div>

  <!-- Stats row -->
  <div class="stats-row">
    <div class="stat-cell">
      <div class="stat-cell-val">5</div>
      <div class="stat-cell-label">In Locker</div>
    </div>
    <div class="stat-cell">
      <div class="stat-cell-val">2</div>
      <div class="stat-cell-label">Listed</div>
    </div>
    <div class="stat-cell">
      <div class="stat-cell-val" style="color:var(--success)">1</div>
      <div class="stat-cell-label">Sold</div>
    </div>
  </div>

  <!-- Settings: Preferences -->
  <div class="settings-section">
    <div class="settings-label">Preferences</div>
    <div class="settings-card">

      <div class="settings-row">
        <div class="settings-row-icon amber">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
        </div>
        <div class="settings-row-body">
          <div class="settings-row-title">Notifications</div>
          <div class="settings-row-sub">Repack & service reminders</div>
        </div>
        <button class="toggle on" id="toggle-notif" aria-label="Toggle notifications"></button>
      </div>

      <div class="settings-row">
        <div class="settings-row-icon neutral">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
        </div>
        <div class="settings-row-body">
          <div class="settings-row-title">Altitude units</div>
          <div class="settings-row-sub">Display altitudes and distances in</div>
        </div>
        <select class="select-pill" id="sel-units" aria-label="Units">
          <option value="ft">ft</option>
          <option value="m">m</option>
        </select>
      </div>

      <div class="settings-row">
        <div class="settings-row-icon neutral">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 010 20M12 2a15.3 15.3 0 000 20"/></svg>
        </div>
        <div class="settings-row-body">
          <div class="settings-row-title">Country / Repack rules</div>
          <div class="settings-row-sub" id="sel-country-sub">Applies local packing interval</div>
        </div>
        <select class="select-pill" id="sel-country" aria-label="Country">
          <option value="US">US</option>
          <option value="UK">UK</option>
          <option value="AU">AU</option>
          <option value="DE">DE</option>
          <option value="FR">FR</option>
          <option value="NZ">NZ</option>
          <option value="Other">Other</option>
        </select>
      </div>

      <div class="settings-row">
        <div class="settings-row-icon neutral">
          <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
          <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
        </div>
        <div class="settings-row-body">
          <div class="settings-row-title" id="theme-label">Dark mode</div>
        </div>
        <button class="toggle on" id="toggle-theme" aria-label="Toggle theme"></button>
      </div>

    </div>
  </div>

  <!-- Settings: Account -->
  <div class="settings-section">
    <div class="settings-label">Account</div>
    <div class="settings-card">
      <div class="settings-row">
        <button class="signout-btn" id="signout-btn">
          <div class="settings-row-icon danger">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          </div>
          <div class="settings-row-body">
            <div class="settings-row-title" style="color:var(--danger)">Sign out</div>
            <div class="settings-row-sub">Clears local data</div>
          </div>
        </button>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="profile-footer">Manifest beta · v0.1</div>

  <!-- Bottom nav -->
  <nav class="bottom-nav">
    <a href="/app" class="tab">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Home
    </a>
    <a href="/app/locker" class="tab">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/><circle cx="12" cy="14" r="2"/></svg>
      Locker
    </a>
    <a href="/app/market" class="tab">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
      Market
    </a>
    <a href="/app/profile" class="tab active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Profile
    </a>
  </nav>

</div>
<script src="/app/app.js"></script>
<script>
(function () {
  var profile = {};
  try { profile = JSON.parse(localStorage.getItem('manifest_profile') || '{}'); } catch(e) {}

  /* Avatar & name */
  var name = profile.name || 'Skydiver';
  document.getElementById('profile-avatar').textContent = name.charAt(0).toUpperCase();
  document.getElementById('profile-name').textContent = name;

  /* Jump count */
  var jumpsEl = document.getElementById('profile-jump-count');
  if (profile.jumpsExact && !isNaN(Number(profile.jumpsExact))) {
    jumpsEl.textContent = Number(profile.jumpsExact).toLocaleString();
  } else if (profile.jumpBand) {
    jumpsEl.textContent = profile.jumpBand;
    jumpsEl.style.fontSize = '2rem';
  } else {
    jumpsEl.textContent = '—';
  }

  /* Home DZ */
  if (profile.homeDZ) {
    document.getElementById('profile-dz').style.display = 'flex';
    document.getElementById('profile-dz-name').textContent = profile.homeDZ;
  }

  /* License chips */
  var chipsEl = document.getElementById('profile-chips');
  if (profile.licenses && profile.licenses.length) {
    profile.licenses.forEach(function (lic) {
      var chip = document.createElement('span');
      chip.className = 'profile-rating-chip';
      chip.textContent = lic;
      chipsEl.appendChild(chip);
    });
  }

  /* Settings — load saved values */
  var settings = {};
  try { settings = JSON.parse(localStorage.getItem('manifest_settings') || '{}'); } catch(e) {}

  var notifToggle  = document.getElementById('toggle-notif');
  var themeToggle  = document.getElementById('toggle-theme');
  var themeLabel   = document.getElementById('theme-label');
  var selUnits     = document.getElementById('sel-units');
  var selCountry   = document.getElementById('sel-country');

  /* Notifications */
  if (settings.notif === false) notifToggle.classList.remove('on');
  notifToggle.addEventListener('click', function () {
    notifToggle.classList.toggle('on');
    settings.notif = notifToggle.classList.contains('on');
    saveSettings();
  });

  /* Units */
  if (settings.units) selUnits.value = settings.units;
  selUnits.addEventListener('change', function () {
    settings.units = selUnits.value;
    saveSettings();
  });

  /* Country */
  if (settings.country) selCountry.value = settings.country;
  selCountry.addEventListener('change', function () {
    settings.country = selCountry.value;
    saveSettings();
  });

  /* Theme toggle — synced with global theme */
  function syncThemeToggle() {
    var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    themeLabel.textContent = isDark ? 'Dark mode' : 'Light mode';
    if (isDark) themeToggle.classList.add('on');
    else        themeToggle.classList.remove('on');
  }
  syncThemeToggle();

  themeToggle.addEventListener('click', function () {
    var next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    document.body.classList.add('transitioning');
    setTimeout(function () { document.body.classList.remove('transitioning'); }, 350);
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('mf_theme', next);
    syncThemeToggle();
  });

  /* Sign out */
  document.getElementById('signout-btn').addEventListener('click', function () {
    if (confirm('Sign out and clear local data?')) {
      localStorage.removeItem('manifest_profile');
      localStorage.removeItem('manifest_settings');
      window.location.href = '/app/onboarding';
    }
  });

  function saveSettings() {
    localStorage.setItem('manifest_settings', JSON.stringify(settings));
  }
})();
</script>
</body>
</html>
